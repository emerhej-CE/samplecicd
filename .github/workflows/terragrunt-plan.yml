# Portable Terragrunt plan — configure repo Variables (Settings → Secrets and variables → Actions → Variables):
#   DEV_AWS_ROLE_ARN, QA_AWS_ROLE_ARN, PROD_AWS_ROLE_ARN, AWS_REGION (required)
#   TG_STACKS_DIR (optional) — if set, used as the stack root and skips auto-detection from the git diff
#   TG_VERSION (optional) — default 0.67.16
#   TFPLAN2MD_VERSION (optional) — default 1.42.0 (Linux x64 tarball from oocx/tfplan2md releases)
# Stack root is auto-detected from changed paths under live/<env>/<region> (see discover job),
#   except: modules/** or no live root in diff → default live/qa/us-east-1. preprod: live/dev, live/qa; production: live/prod
name: Terragrunt Plan

on:
  pull_request:
    branches:
      - preprod
      - production
    paths:
      - "live/**"
      - "modules/**"
  push:
    branches:
      - preprod
      - production
    paths:
      - "live/**"
      - "modules/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  discover:
    name: Discover Terragrunt stacks
    runs-on: ubuntu-latest
    env:
      # Repo override, event SHAs, and default for modules/ / unmapped diffs (no live/<env>/<region> in paths)
      REPO_TG_STACKS: ${{ vars.TG_STACKS_DIR }}
      DEFAULT_TG_ROOT: "live/qa/us-east-1"
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
      PR_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      PUSH_BEFORE: ${{ github.event.before }}
      PUSH_AFTER: ${{ github.event.after || github.sha }}
      # Target branch for PRs (preprod/production); ref for pushes — used for env/branch policy
      WORKFLOW_REF_NAME: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      tg_stacks_dir_dynamic: ${{ steps.set.outputs.tg_stacks_dir_dynamic }}
      live_env: ${{ steps.set.outputs.live_env }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set
        env:
          TG_MODE: plan
        run: |
          set -euo pipefail
          python3 <<'PY'
          import glob
          import json
          import os
          import re
          import subprocess
          import sys
          from collections import defaultdict, deque

          # --- resolve BASE = live/<env>/<region> (Terragrunt stacks parent) ---
          DEFAULT_BASE = (os.environ.get("DEFAULT_TG_ROOT") or "live/qa/us-east-1").strip()
          override = (os.environ.get("REPO_TG_STACKS") or "").strip()
          if override:
              base = override
              inferred_from_default = False
          else:
              def is_aws_region_segment(s: str) -> bool:
                  if s in ("config", "live", "modules"):
                      return False
                  # e.g. us-east-1, ap-south-1, ap-southeast-1
                  return bool(re.match(r"^[a-z0-9]+(-[a-z0-9]+)*-[0-9]+$", s) and s.count("-") >= 1)

              def get_changed_files():
                  ev = os.environ.get("GITHUB_EVENT_NAME", "")
                  if ev == "pull_request":
                      b = os.environ.get("PR_BASE_SHA", "").strip()
                      h = os.environ.get("PR_HEAD_SHA", "").strip()
                      if not b or not h:
                          print("error: missing PR base/head ref for diff", file=sys.stderr)
                          sys.exit(1)
                      out = subprocess.check_output(
                          ["git", "diff", "--name-only", b, h], text=True, stderr=subprocess.DEVNULL
                      )
                  elif ev == "push":
                      before = os.environ.get("PUSH_BEFORE", "").strip()
                      after = os.environ.get("PUSH_AFTER", "").strip()
                      if before in ("", "0" * 40) or (len(before) == 40 and set(before) == {"0"}):
                          out = subprocess.check_output(
                              ["git", "diff-tree", "--no-commit-id", "-r", "--name-only", after], text=True
                      )
                      else:
                          out = subprocess.check_output(
                              ["git", "diff", "--name-only", before, after], text=True
                      )
                  else:
                      print(f"error: unsupported event: {ev}", file=sys.stderr)
                      sys.exit(1)
                  return [ln for ln in out.splitlines() if ln.strip()]

              def live_roots_for_path(path: str) -> set:
                  roots: set = set()
                  if not path.strip().startswith("live/"):
                      return roots
                  parts = path.split("/")
                  if len(parts) < 3:
                      return roots
                  # live/<env>/<region>/... (e.g. live/qa/us-east-1/s3/terragrunt.hcl)
                  if parts[2] != "config" and is_aws_region_segment(parts[2]):
                      roots.add(f"live/{parts[1]}/{parts[2]}")
                      return roots
                  # live/<env>/config/<region>/... (yaml config next to this env)
                  if len(parts) >= 4 and parts[2] == "config" and is_aws_region_segment(parts[3]):
                      roots.add(f"live/{parts[1]}/{parts[3]}")
                  return roots

              changed = get_changed_files()
              all_roots: set = set()
              for f in changed:
                  all_roots |= live_roots_for_path(f)
              if len(all_roots) > 1:
                  rlist = ", ".join(sorted(all_roots))
                  print(
                      f"error: terragrunt-plan supports one live/<env>/<region> root per run; this diff has multiple: {rlist}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              if len(all_roots) == 1:
                  base = next(iter(all_roots))
                  inferred_from_default = False
              else:
                  # Only modules, workflow, or unmapped live/qa files → default
                  base = DEFAULT_BASE
                  inferred_from_default = len(all_roots) == 0

          if not base:
              print("error: empty stacks root", file=sys.stderr)
              sys.exit(1)
          pbase = base.strip().strip("/").split("/")
          if len(pbase) < 2 or pbase[0] != "live":
              print("error: could not derive live env from base", file=sys.stderr)
              sys.exit(1)
          live_env = pbase[1]
          ref = (os.environ.get("WORKFLOW_REF_NAME") or "").strip()
          if (not override) and ref == "production" and inferred_from_default:
              print(
                  "error: production plan needs a change under live/prod/ in the diff, or set TG_STACKS_DIR",
                  file=sys.stderr,
              )
              sys.exit(1)
          if ref == "preprod" and live_env not in ("dev", "qa"):
              print(
                  f"error: preprod only supports live/dev/ or live/qa/; got {base} (env={live_env})",
                  file=sys.stderr,
              )
              sys.exit(1)
          if ref == "production" and live_env != "prod":
              print(
                  f"error: production only supports live/prod/; got {base} (env={live_env})",
                  file=sys.stderr,
              )
              sys.exit(1)
          # --- build matrix (unchanged) ---
          MODE = os.environ.get("TG_MODE", "apply")
          BASE = base
          DEP_RE = re.compile(r'config_path\s*=\s*"\.\./([^"]+)"')

          def module_names():
              paths = glob.glob(os.path.join(BASE, "*", "terragrunt.hcl"))
              return sorted({os.path.basename(os.path.dirname(p)) for p in paths})

          def declared_deps(mod):
              path = os.path.join(BASE, mod, "terragrunt.hcl")
              with open(path, encoding="utf-8") as f:
                  text = f.read()
              return list(dict.fromkeys(DEP_RE.findall(text)))

          def topo_apply_order(names):
              name_set = set(names)
              indeg = {n: 0 for n in names}
              edges = defaultdict(list)
              for m in names:
                  for d in declared_deps(m):
                      if d not in name_set:
                          continue
                      edges[d].append(m)
                      indeg[m] += 1
              q = deque(sorted(n for n in names if indeg[n] == 0))
              out = []
              while q:
                  n = q.popleft()
                  out.append(n)
                  for w in sorted(edges[n]):
                      indeg[w] -= 1
                      if indeg[w] == 0:
                          q.append(w)
              if len(out) != len(names):
                  print("cycle or unresolved deps", file=sys.stderr)
                  sys.exit(1)
              return out

          names = module_names()
          if not names:
              print(f"error: no */terragrunt.hcl under {BASE}", file=sys.stderr)
              sys.exit(1)
          order = topo_apply_order(names)
          if MODE == "destroy":
              order = list(reversed(order))
          matrix_json = json.dumps([{"module": m} for m in order])
          gh = os.environ.get("GITHUB_OUTPUT")
          if not gh:
              print("error: GITHUB_OUTPUT is not set", file=sys.stderr)
              sys.exit(1)
          with open(gh, "a", encoding="utf-8") as f:
              f.write(f"tg_stacks_dir_dynamic={base}\n")
              f.write(f"live_env={live_env}\n")
              f.write("matrix<<EOF\n")
              f.write(matrix_json + "\n")
              f.write("EOF\n")
          PY

  plan:
    name: Plan (Makefile)
    needs: [discover]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.discover.outputs.live_env == 'dev' && vars.DEV_AWS_ROLE_ARN || needs.discover.outputs.live_env == 'qa' && vars.QA_AWS_ROLE_ARN || needs.discover.outputs.live_env == 'prod' && vars.PROD_AWS_ROLE_ARN || '' }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Terragrunt
        env:
          TG_VERSION_INPUT: ${{ vars.TG_VERSION }}
        run: |
          TG_VERSION="${TG_VERSION_INPUT:-0.67.16}"
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Install tfplan2md
        env:
          TFPLAN2MD_VERSION_INPUT: ${{ vars.TFPLAN2MD_VERSION }}
        run: |
          set -euo pipefail
          VERSION="${TFPLAN2MD_VERSION_INPUT:-1.42.0}"
          TGZ="tfplan2md_${VERSION}_linux-x64.tar.gz"
          wget -q -O "/tmp/${TGZ}" "https://github.com/oocx/tfplan2md/releases/download/v${VERSION}/${TGZ}"
          tar -xzf "/tmp/${TGZ}" -C /tmp
          sudo install -m 0755 /tmp/tfplan2md /usr/local/bin/tfplan2md
          tfplan2md --help | head -n 5

      - name: Run Makefile plan
        env:
          LIVE_ENV: ${{ needs.discover.outputs.live_env }}
        run: |
          set -euo pipefail
          case "${LIVE_ENV}" in
            dev)  make plan dev ;;
            qa)   make plan qa ;;
            prod) make plan prod ;;
            *)
              echo "Unsupported live_env: ${LIVE_ENV}"
              exit 1
              ;;
          esac

      - name: Upload plan outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terragrunt-plan-${{ needs.discover.outputs.live_env }}
          path: |
            scripts/plan/tg2md-plan-logs
            scripts/plan/unfiltered-plan-output
          if-no-files-found: warn
