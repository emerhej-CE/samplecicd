name: Terragrunt Plan

on:
  pull_request:
    branches:
      - main
      - qa

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan-s3:
    name: Plan s3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: live/dev/us-east-1/s3
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.16
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - run: terragrunt hclfmt --check
      - run: terragrunt init -input=false --terragrunt-non-interactive
      - run: terragrunt validate --terragrunt-non-interactive
      - run: terragrunt plan -input=false -no-color --terragrunt-non-interactive

  plan-ec2:
    name: Plan ec2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: live/dev/us-east-1/ec2
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.16
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - run: terragrunt hclfmt --check
      - run: terragrunt init -input=false --terragrunt-non-interactive
      - run: terragrunt validate --terragrunt-non-interactive
      - run: terragrunt plan -input=false -no-color --terragrunt-non-interactive

  plan-cloudfront:
    name: Plan cloudfront
    needs: [plan-s3]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: live/dev/us-east-1/cloudfront
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.16
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - run: terragrunt hclfmt --check
      - run: terragrunt init -input=false --terragrunt-non-interactive
      - run: terragrunt validate --terragrunt-non-interactive
      - run: terragrunt plan -input=false -no-color --terragrunt-non-interactive
