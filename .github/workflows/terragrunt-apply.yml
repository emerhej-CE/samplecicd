name: Terragrunt Apply

on:
  push:
    branches:
      - main
      - qa

permissions:
  contents: read
  id-token: write

jobs:
  apply-s3:
    name: Apply s3
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: live/dev/us-east-1/s3
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.16
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - run: terragrunt init -input=false --terragrunt-non-interactive
      - run: terragrunt apply -auto-approve -input=false --terragrunt-non-interactive

  apply-ec2:
    name: Apply ec2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: live/dev/us-east-1/ec2
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.16
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - run: terragrunt init -input=false --terragrunt-non-interactive
      - run: terragrunt apply -auto-approve -input=false --terragrunt-non-interactive

  apply-cloudfront:
    name: Apply cloudfront
    needs: [apply-s3]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: live/dev/us-east-1/cloudfront
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.16
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - run: terragrunt init -input=false --terragrunt-non-interactive
      - run: terragrunt apply -auto-approve -input=false --terragrunt-non-interactive
