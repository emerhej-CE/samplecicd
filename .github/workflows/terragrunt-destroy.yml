# Terragrunt destroy — repo Variables: DEV_AWS_ROLE_ARN, QA_AWS_ROLE_ARN, PROD_AWS_ROLE_ARN, AWS_REGION (required)
#   workflow_dispatch.stack_path (required choice). TG_VERSION via vars.TG_VERSION (optional, default 0.67.16)
#   Run from branch preprod or production; path must match branch (see discover validation).
name: Terragrunt Destroy

on:
  workflow_dispatch:
    inputs:
      stack_path:
        description: "Stack root to destroy: live/dev/us-east-1, live/qa/us-east-1, or live/prod/us-east-1"
        required: true
        type: choice
        options:
          - live/dev/us-east-1
          - live/qa/us-east-1
          - live/prod/us-east-1

permissions:
  contents: read
  id-token: write

jobs:
  discover:
    name: Discover Terragrunt stacks (destroy order)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      live_env: ${{ steps.set.outputs.live_env }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        env:
          TG_MODE: destroy
          STACK_PATH: ${{ github.event.inputs.stack_path }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          FULL=$(python3 <<'PY'
          import glob
          import json
          import os
          import re
          import sys
          from collections import defaultdict, deque

          BASE = (os.environ.get("STACK_PATH") or "").strip()
          REF = (os.environ.get("GITHUB_REF_NAME") or "").strip()
          MODE = os.environ.get("TG_MODE", "apply")
          DEP_RE = re.compile(r'config_path\s*=\s*"\.\./([^"]+)"')

          if not BASE:
              print("error: stack_path is required", file=sys.stderr)
              sys.exit(1)
          if not BASE.startswith("live/"):
              print(f"error: stack_path must start with live/, got {BASE!r}", file=sys.stderr)
              sys.exit(1)
          parts = BASE.strip("/").split("/")
          if len(parts) != 3:
              print(f"error: stack_path must be live/<env>/<region>, got {BASE!r}", file=sys.stderr)
              sys.exit(1)
          env_part, region_part = parts[1], parts[2]
          if env_part not in ("dev", "qa", "prod"):
              print(f"error: env must be dev, qa, or prod, got {env_part!r}", file=sys.stderr)
              sys.exit(1)
          if not re.fullmatch(r"[a-z0-9-]+", region_part):
              print(f"error: invalid region segment {region_part!r}", file=sys.stderr)
              sys.exit(1)
          if REF not in ("preprod", "production"):
              print(
                  f"error: run this workflow from branch preprod or production (got {REF!r})",
                  file=sys.stderr,
              )
              sys.exit(1)
          if REF == "production" and BASE != "live/prod/us-east-1":
              print(
                  f"error: on production branch only live/prod/us-east-1 is allowed, got {BASE!r}",
                  file=sys.stderr,
              )
              sys.exit(1)
          if REF == "preprod" and BASE not in ("live/dev/us-east-1", "live/qa/us-east-1"):
              print(
                  f"error: on preprod branch only live/dev/us-east-1 or live/qa/us-east-1, got {BASE!r}",
                  file=sys.stderr,
              )
              sys.exit(1)
          live_env = env_part

          def module_names():
              paths = glob.glob(os.path.join(BASE, "*", "terragrunt.hcl"))
              return sorted({os.path.basename(os.path.dirname(p)) for p in paths})

          def declared_deps(mod):
              path = os.path.join(BASE, mod, "terragrunt.hcl")
              with open(path, encoding="utf-8") as f:
                  text = f.read()
              return list(dict.fromkeys(DEP_RE.findall(text)))

          def topo_apply_order(names):
              name_set = set(names)
              indeg = {n: 0 for n in names}
              edges = defaultdict(list)
              for m in names:
                  for d in declared_deps(m):
                      if d not in name_set:
                          continue
                      edges[d].append(m)
                      indeg[m] += 1
              q = deque(sorted(n for n in names if indeg[n] == 0))
              out = []
              while q:
                  n = q.popleft()
                  out.append(n)
                  for w in sorted(edges[n]):
                      indeg[w] -= 1
                      if indeg[w] == 0:
                          q.append(w)
              if len(out) != len(names):
                  print("cycle or unresolved deps", file=sys.stderr)
                  sys.exit(1)
              return out

          names = module_names()
          if not names:
              print(f"error: no */terragrunt.hcl under {BASE}", file=sys.stderr)
              sys.exit(1)
          order = topo_apply_order(names)
          if MODE == "destroy":
              order = list(reversed(order))

          obj = {
              "matrix": [{"module": m} for m in order],
              "live_env": live_env,
          }
          print(json.dumps(obj))
          PY
          )
          MATRIX=$(echo "$FULL" | jq -c '.matrix')
          LIVE_ENV=$(echo "$FULL" | jq -r '.live_env')
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MATRIX" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "live_env=$LIVE_ENV" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX live_env=$LIVE_ENV"

  destroy:
    name: Destroy ${{ matrix.module }}
    needs: [discover]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ github.event.inputs.stack_path }}/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.discover.outputs.live_env == 'dev' && vars.DEV_AWS_ROLE_ARN || needs.discover.outputs.live_env == 'qa' && vars.QA_AWS_ROLE_ARN || needs.discover.outputs.live_env == 'prod' && vars.PROD_AWS_ROLE_ARN || '' }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Install Terragrunt
        env:
          TG_VERSION_INPUT: ${{ vars.TG_VERSION }}
        run: |
          TG_VERSION="${TG_VERSION_INPUT:-0.67.16}"
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - run: terragrunt init -input=false --terragrunt-non-interactive
      - run: terragrunt destroy -auto-approve -input=false --terragrunt-non-interactive
