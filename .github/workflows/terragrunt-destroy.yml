# Terragrunt destroy — repo Variables: QA_AWS_ROLE_ARN, PROD_AWS_ROLE_ARN, AWS_REGION (required)
#   workflow_dispatch: confirm_destroy must be DESTROY. preprod → live/qa/us-east-1, production → live/prod/us-east-1. TG_VERSION optional.
name: Terragrunt Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  discover:
    name: Discover Terragrunt stacks (destroy order)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      live_env: ${{ steps.set.outputs.live_env }}
      stack_path: ${{ steps.set.outputs.stack_path }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        env:
          TG_MODE: destroy
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "::error::confirm_destroy must be exactly DESTROY (case-sensitive)"
            exit 1
          fi
          FULL=$(python3 <<'PY'
          import glob
          import json
          import os
          import re
          import sys
          from collections import defaultdict, deque

          REF = (os.environ.get("GITHUB_REF_NAME") or "").strip()
          MODE = os.environ.get("TG_MODE", "apply")
          DEP_RE = re.compile(r'config_path\s*=\s*"\.\./([^"]+)"')

          if REF == "production":
              BASE = "live/prod/us-east-1"
              live_env = "prod"
          elif REF == "preprod":
              BASE = "live/qa/us-east-1"
              live_env = "qa"
          else:
              print(
                  f"error: run this workflow from branch preprod or production only (got {REF!r})",
                  file=sys.stderr,
              )
              sys.exit(1)

          def module_names():
              paths = glob.glob(os.path.join(BASE, "*", "terragrunt.hcl"))
              return sorted({os.path.basename(os.path.dirname(p)) for p in paths})

          def declared_deps(mod):
              path = os.path.join(BASE, mod, "terragrunt.hcl")
              with open(path, encoding="utf-8") as f:
                  text = f.read()
              return list(dict.fromkeys(DEP_RE.findall(text)))

          def topo_apply_order(names):
              name_set = set(names)
              indeg = {n: 0 for n in names}
              edges = defaultdict(list)
              for m in names:
                  for d in declared_deps(m):
                      if d not in name_set:
                          continue
                      edges[d].append(m)
                      indeg[m] += 1
              q = deque(sorted(n for n in names if indeg[n] == 0))
              out = []
              while q:
                  n = q.popleft()
                  out.append(n)
                  for w in sorted(edges[n]):
                      indeg[w] -= 1
                      if indeg[w] == 0:
                          q.append(w)
              if len(out) != len(names):
                  print("cycle or unresolved deps", file=sys.stderr)
                  sys.exit(1)
              return out

          names = module_names()
          if not names:
              print(f"error: no */terragrunt.hcl under {BASE}", file=sys.stderr)
              sys.exit(1)
          order = topo_apply_order(names)
          if MODE == "destroy":
              order = list(reversed(order))

          obj = {
              "matrix": [{"module": m} for m in order],
              "live_env": live_env,
              "stack_path": BASE,
          }
          print(json.dumps(obj))
          PY
          )
          MATRIX=$(echo "$FULL" | jq -c '.matrix')
          LIVE_ENV=$(echo "$FULL" | jq -r '.live_env')
          STACK_PATH=$(echo "$FULL" | jq -r '.stack_path')
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MATRIX" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "live_env=$LIVE_ENV" >> "$GITHUB_OUTPUT"
          echo "stack_path=$STACK_PATH" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX live_env=$LIVE_ENV stack_path=$STACK_PATH"

  destroy:
    name: Destroy ${{ matrix.module }}
    needs: [discover]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ needs.discover.outputs.stack_path }}/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.discover.outputs.live_env == 'qa' && vars.QA_AWS_ROLE_ARN || needs.discover.outputs.live_env == 'prod' && vars.PROD_AWS_ROLE_ARN || '' }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Install Terragrunt
        env:
          TG_VERSION_INPUT: ${{ vars.TG_VERSION }}
        run: |
          TG_VERSION="${TG_VERSION_INPUT:-0.67.16}"
          wget -q -O terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version
      - run: terragrunt init -input=false --terragrunt-non-interactive
      - run: terragrunt destroy -auto-approve -input=false --terragrunt-non-interactive
