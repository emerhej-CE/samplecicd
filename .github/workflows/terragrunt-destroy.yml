name: Terragrunt Destroy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type DESTROY to confirm (irreversible)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  destroy:
    name: Destroy ${{ matrix.module }}
    if: github.event.inputs.confirmation == 'DESTROY'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - s3
          - ec2

    defaults:
      run:
        working-directory: live/dev/us-east-1/${{ matrix.module }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terragrunt
        run: |
          TG_VERSION=0.67.16
          wget -O terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Init
        run: terragrunt init -input=false --terragrunt-non-interactive

      - name: Terragrunt Destroy
        run: terragrunt destroy -auto-approve -input=false --terragrunt-non-interactive
